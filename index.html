<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0f19;
  --surface: #111827;
  --surface2: #1a2236;
  --border: rgba(255,255,255,0.07);
  --text: #e2ddd6;
  --muted: #6b7280;
  --accent-warm: #f0833a;
  --accent-cool: #38bdf8;
  --accent-gold: #f0c060;
  --red: #e05a52;
  --purple: #a78bfa;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ─── HEADER ─── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 56px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  z-index: 1000;
}

.hbrand {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.hbrand h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}

.hbrand .htag {
  font-size: 0.63rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  padding-left: 14px;
  border-left: 1px solid var(--border);
}

.hkpis {
  display: flex;
  gap: 22px;
}

.kpi {
  text-align: right;
}

.kpi .kv {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--accent-gold);
  line-height: 1;
}

.kpi .kl {
  font-size: 0.58rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ─── MAP ─── */
#map-container {
  flex: 1;
  position: relative;
}

#map {
  width: 100%;
  height: 100%;
}

/* ─── LEGEND ─── */
.panel {
  position: absolute;
  z-index: 500;
  background: rgba(17, 24, 39, 0.92);
  border: 1px solid var(--border);
  border-radius: 16px;
  backdrop-filter: blur(16px);
  padding: 16px 18px;
}

.panel-title {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 13px;
  font-weight: 600;
}

.legend { bottom: 24px; left: 18px; min-width: 195px; }

.leg-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 0.74rem;
  color: var(--text);
}

.leg-circle {
  border-radius: 50%;
  flex-shrink: 0;
  opacity: 0.88;
}

.leg-divider {
  height: 1px;
  background: var(--border);
  margin: 10px 0;
}

.leg-type {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.68rem;
  color: var(--muted);
  margin-bottom: 5px;
}

.tring {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 2px solid;
  flex-shrink: 0;
}

/* ─── FILTER ─── */
.filter-panel { top: 16px; right: 16px; min-width: 185px; }

.fbtns { display: flex; flex-direction: column; gap: 5px; }

.fbtn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.73rem;
  padding: 7px 11px;
  cursor: pointer;
  transition: all 0.14s;
  display: flex;
  align-items: center;
  gap: 8px;
  text-align: left;
}

.fbtn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
.fbtn.active { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); color: var(--text); font-weight: 600; }

.fdot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: transparent;
  border: 2px solid rgba(255,255,255,0.35);
  transition: background 0.14s, border-color 0.14s;
}
.fbtn.active .fdot {
  background: var(--accent-cool);
  border-color: var(--accent-cool);
}

/* ─── POPUP ─── */
.leaflet-popup-content-wrapper {
  background: var(--surface2) !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  border-radius: 16px !important;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7) !important;
  padding: 0 !important;
  overflow: hidden !important;
  min-width: 270px;
  max-width: 360px;
}

.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip-container { display: none !important; }

.pu-head {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.pu-head::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(240,131,58,0.18) 0%, transparent 70%);
  pointer-events: none;
}

.pu-type {
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 5px;
}

.pu-naam {
  font-family: 'Playfair Display', serif;
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.25;
  color: var(--text);
}

.pu-gem {
  font-size: 0.63rem;
  color: var(--muted);
  margin-top: 3px;
}

.pu-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 9px;
  background: var(--accent-warm);
  color: white;
  font-size: 0.67rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}

.pu-body { padding: 11px 16px 14px; }

.pu-names {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px 10px;
  font-size: 0.67rem;
  color: #9ca3af;
  line-height: 1.75;
}

.pu-names span::before {
  content: '· ';
  color: var(--accent-warm);
  font-weight: 700;
}

/* ─── CENTER MARKER ─── */
.cmarker {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--accent-warm);
  border: 3px solid white;
  box-shadow: 0 0 0 4px rgba(240,131,58,0.35), 0 4px 20px rgba(240,131,58,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 15px;
  animation: ringpulse 2.8s infinite;
}

@keyframes ringpulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(240,131,58,0.3), 0 4px 20px rgba(240,131,58,0.4); }
  50%      { box-shadow: 0 0 0 12px rgba(240,131,58,0.08), 0 4px 24px rgba(240,131,58,0.6); }
}

/* leaflet overrides */
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
  font-family: 'Syne', sans-serif !important;
}
.leaflet-control-zoom a:hover { background: var(--surface2) !important; }
.leaflet-control-attribution {
  background: rgba(11,15,25,0.75) !important;
  color: var(--muted) !important;
  font-size: 0.58rem !important;
}
.leaflet-control-attribution a { color: #4b5563 !important; }
</style>
</head>

// ═══════════════════════════════════════════════════════════
// MAP SETUP
// ═══════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [51.20, 4.43],
  zoom: 11,
  zoomControl: false,
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

// Dark map tiles
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// Labels only overlay (roads / city names)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19, opacity: 0.7
}).addTo(map);

// 25 km radius circle
L.circle([51.2226, 4.4687], {
  radius: 25000,
  color: '#f0833a',
  weight: 1.5,
  opacity: 0.3,
  fillColor: '#f0833a',
  fillOpacity: 0.04,
  dashArray: '7 7',
}).addTo(map);

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function color(n) {
  if (n >= 20) return '#f0833a';
  if (n >= 12) return '#e05a52';
  if (n >= 6)  return '#38bdf8';
  if (n >= 3)  return '#60a5d8';
  return '#7890a8';
}

function radius(n) {
  if (n >= 25) return 34;
  if (n >= 20) return 29;
  if (n >= 12) return 23;
  if (n >= 8)  return 19;
  if (n >= 6)  return 15;
  if (n >= 3)  return 12;
  if (n >= 2)  return 9;
  return 7;
}

function borderCol(type) {
  return type === 'zh' ? '#f0833a' : '#38bdf8';
}

// ═══════════════════════════════════════════════════════════
// MARKERS
// ═══════════════════════════════════════════════════════════
let markers = [];

LOCS.forEach(loc => {
  // Center marker handled separately
  if (loc.center) {
    const ci = L.divIcon({
      className: '',
      html: `<div class="cmarker">★</div>`,
      iconSize: [36, 36], iconAnchor: [18, 18], popupAnchor: [0, -22]
    });
    L.marker([loc.lat, loc.lng], { icon: ci, zIndexOffset: 3000 })
      .bindPopup(buildPopup(loc), { maxWidth: 380, minWidth: 280 })
      .addTo(map);
    return;
  }

  const AZ_MONICA_CAMPUSSEN = [
    "Oogkliniek campus Deurne Noord",
    "Oogkliniek campus Deurne Zuid",
    "Oogkliniek campus Merksem",
    "Oogkliniek campus Schoten",
    "Oogkliniek campus Wijnegem",
    "Oogkliniek campus Wuustwezel",
    "Oogkliniek campus Boechout",
    "Oogarts Hove (Wynants)",
    "Oogkliniek Antwerpen (Grote Steenweg Berchem)"
  ];
  const isMonicaCampus = AZ_MONICA_CAMPUSSEN.includes(loc.naam);

  const r = 14; // vaste grootte voor alle bollen
  const c = isMonicaCampus ? '#f0833a' : '#38bdf8';
  const bc = isMonicaCampus ? '#ff6600' : '#1a8fd1';
  const glowColor = isMonicaCampus ? '240,131,58' : '56,189,248';

  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:${r*2}px;height:${r*2}px;
      background:${c};
      border:2px solid ${bc};
      border-radius:50%;
      box-shadow:0 0 ${r*0.8}px rgba(${glowColor},0.5),0 2px 10px rgba(0,0,0,0.55);
      display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;
      font-size:13px;
      font-weight:700;
      color:rgba(255,255,255,${isMonicaCampus ? 0.95 : 0});
      cursor:pointer;
      transition:transform 0.15s ease,box-shadow 0.15s ease;
    " class="mb">${isMonicaCampus ? '★' : ''}</div>`,
    iconSize: [r*2, r*2],
    iconAnchor: [r, r],
    popupAnchor: [0, -(r + 6)]
  });

  const m = L.marker([loc.lat, loc.lng], { icon })
    .bindPopup(buildPopup(loc), { maxWidth: 380, minWidth: 270 })
    .addTo(map);

  m.on('mouseover', function() {
    const el = this.getElement()?.querySelector('.mb');
    if (el) {
      el.style.transform = 'scale(1.35)';
      el.style.boxShadow = `0 0 ${r*1.4}px rgba(${glowColor},0.7),0 4px 16px rgba(0,0,0,0.6)`;
    }
  });
  m.on('mouseout', function() {
    const el = this.getElement()?.querySelector('.mb');
    if (el) {
      el.style.transform = 'scale(1)';
      el.style.boxShadow = `0 0 ${r*0.8}px rgba(${glowColor},0.4),0 2px 10px rgba(0,0,0,0.55)`;
    }
  });

  m._loc = loc;
  markers.push(m);
});

function buildPopup(loc) {
  const typeLabel = loc.type === 'zh' || loc.center
    ? '🏥 Ziekenhuis / kliniek'
    : '🔬 Privépraktijk';
  const names = loc.artsen.map(a => `<span>${a}</span>`).join('');
  return `
    <div class="pu-head">
      <div class="pu-type">${typeLabel}</div>
      <div class="pu-naam">${loc.naam}</div>
      <div class="pu-gem">${loc.gem}</div>
      <div class="pu-badge">👁 ${loc.n} oogarts${loc.n !== 1 ? 'en' : ''}${loc.center ? ' · Centrum 25 km straal' : ''}</div>
    </div>
    <div class="pu-body">
      <div class="pu-names">${names}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// FIT BOUNDS
// ═══════════════════════════════════════════════════════════
const bounds = L.latLngBounds(LOCS.map(l => [l.lat, l.lng]));
map.fitBounds(bounds.pad(0.06));

// ═══════════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════════
function setFilter(f) {
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  const ids = { all:'f-all', zh:'f-zh', pr:'f-pr', big:'f-big' };
  document.getElementById(ids[f])?.classList.add('active');

  markers.forEach(m => {
    const d = m._loc;
    const show =
      f === 'all' ? true :
      f === 'zh'  ? d.type === 'zh' :
      f === 'pr'  ? d.type === 'pr' :
      /* big */     d.n >= 8;

    if (show && !map.hasLayer(m)) map.addLayer(m);
    if (!show && map.hasLayer(m)) map.removeLayer(m);
  });
}
